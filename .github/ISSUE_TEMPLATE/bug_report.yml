name: Bug report
description: Report a reproducible problem in the starter kit
title: "[Bug] "

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough information to reproduce the problem.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the actual behavior and the expected behavior.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run ...
        2. Call ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.5"
    validations:
      required: true

  - type: input
    id: operating-system
    attributes:
      label: Operating system
      placeholder: "Windows 11, Ubuntu 24.04, macOS"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove API keys and secrets before posting logs.
      render: shell
