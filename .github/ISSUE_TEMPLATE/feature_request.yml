name: Feature request
description: Suggest an improvement to the starter kit
title: "[Feature] "

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or architecture you suggest.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any other approaches you considered.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples or relevant technical context.
